name: betpronos
description: "betPronos - Prédiction de scores de football par agents IA"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # State Management
  provider: ^6.1.2
  get_it: ^8.0.2

  # Network
  dio: ^5.7.0
  http: ^1.2.2

  # Supabase Auth
  supabase_flutter: ^2.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # WebView (for Shwary payment)
  webview_flutter: ^4.10.0

  # Device & Permissions
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 30
  adaptive_icon_background: "#0D0E21"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
